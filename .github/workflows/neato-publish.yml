name: Build Neato site

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/neato-publish.yml"
      - "content/posts/**"
      - "content/**"
      - "templates/**"
      - "neato.php"
      - "neato.yaml"
      - "package.json"
      - "package-lock.json"
      - "tina/**"
      - ".pages.yml"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install Node dependencies
        run: npm ci

      - name: Build site with Neato
        run: npm run neato:build

      - name: Build Tina admin
        shell: bash
        run: |
          if [ -z "$TINA_TOKEN" ]; then
            echo "Skipping Tina admin build because TinaCloud secrets are not configured yet."
            exit 0
          fi
          npm run tina:build -- --skip-cloud-checks
          rm -f published/admin/.gitignore
        env:
          TINA_TOKEN: ${{ secrets.TINA_TOKEN }}

      - name: Commit generated site
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Build Neato site"
          file_pattern: "published/**"
