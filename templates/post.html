<!DOCTYPE html>
<html lang="en">
<head>
<title>{title} | Jewitch</title>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="{description}">
<meta property="og:title" content="{title}">
<meta property="og:description" content="{description}">
<meta property="og:type" content="article">
<meta property="og:url" content="https://{site.domain}/{path}">
<meta property="og:site_name" content="Jewitch">
<meta property="og:image" content="https://{site.domain}/assets/social/{uuid}.png">
<meta property="og:image:secure_url" content="https://{site.domain}/assets/social/{uuid}.png">
<meta property="og:image:type" content="image/png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:image:alt" content="{title} - Jewitch">
<meta property="article:published_time" content="{created}">
<meta property="article:modified_time" content="{modified}">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{title}">
<meta name="twitter:description" content="{description}">
<meta name="twitter:image" content="https://{site.domain}/assets/social/{uuid}.png">
<meta name="fediverse:creator" content="@jewitch@social.lol">
<link rel="stylesheet" href="/assets/site.css">
</head>

<body class="post-page">
<a class="visually-hidden" rel="me" href="https://social.lol/@jewitch">Mastodon</a>
<div class="site">
    <header class="site-header">
        <h1 class="site-title"><a href="/">Jewitch</a></h1>
        <div class="tagline">Musings of a Jewish Witch</div>
        <nav class="site-nav" aria-label="Main navigation">
            <a href="/">Home</a>
            <a href="/blog/">Blog</a>
            <a href="/about/">About</a>
            <a href="/now/">Now</a>
            <a href="/colophon/">Colophon</a>
        </nav>
    </header>

    <div class="content post-content">
        <main>
            <article class="post-article">
                <header class="post-heading">
                    <h1>{title}</h1>
                    <p>{description}</p>
                </header>

                <div class="post-meta">
                    <span>Published {created}</span>
                    {tags_html}
                </div>

                <div class="post-body">
                    {content}
                </div>
            </article>

            <a class="back-link" href="/blog/">Return to Blog</a>
        </main>
    </div>

    <footer class="site-footer">
        Copyright 2026 Shira. Built with the Alpha Version of <a href="https://neato.pub/">Neato</a> by Adam Newbold.
    </footer>
</div>
</body>
</html>
