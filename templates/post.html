<!DOCTYPE html>
<html lang="en">
<head>
<title>{title} | Jewitch</title>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="{description}">
<meta name="fediverse:creator" content="@jewitch@social.lol">
<link rel="stylesheet" href="/assets/site.css">
</head>

<body>
<a class="visually-hidden" rel="me" href="https://social.lol/@jewitch">Mastodon</a>
<div class="site">
    <header class="site-header">
        <h1 class="site-title"><a href="/">Jewitch</a></h1>
        <div class="tagline">Musings of a Jewish Witch</div>
        <nav class="site-nav" aria-label="Main navigation">
            <a href="/">Home</a>
            <a href="/blog/">Blog</a>
            <a href="/about/">About</a>
            <a href="https://jewitch.omg.lol/now">Now</a>
        </nav>
    </header>

    <div class="content">
        <main>
            <article>
                <div class="post-meta">
                    <span>Published {created}</span>
                    {tags_html}
                </div>
                {content}
            </article>

            <a class="back-link" href="/blog/">Return to Blog</a>
        </main>
    </div>

    <footer class="site-footer">
        Copyright 2026 Shira. Built with the Alpha Version of <a href="https://neato.pub/">Neato</a> by Adam Newbold.
    </footer>
</div>
</body>
</html>
