<!DOCTYPE html>
<html lang="en">
<head>
<title>{title} | Jewitch</title>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root {
    --bg: #111111;
    --surface: #1a1a1a;
    --text: #e5e5e5;
    --muted: #a1a1aa;
    --accent-light: #c4b5fd;
}

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: system-ui, sans-serif;
}

.profile-card {
    max-width: 950px;
    margin: 2rem auto;
    padding: 4rem;
    background: var(--surface);
    border-radius: 32px;
    text-align: center;
}

.profile-card img {
    width: 260px;
    border-radius: 12px;
    margin-bottom: 2rem;
}

.profile-card h1 {
    font-size: 4rem;
    margin-bottom: .25rem;
}

.profile-card h3 {
    color: var(--muted);
    font-weight: normal;
    margin-top: 0;
}

.profile-card p {
    font-size: 1.4rem;
    line-height: 1.7;
}

.links {
    margin-top: 2rem;
}

.links a {
    color: var(--accent-light);
    text-decoration: none;
    margin: 0 1rem;
    font-size: 1.2rem;
}
</style>
</head>

<body>

<div class="profile-card">

<div class="links">
    <a href="/blog/">Blog</a>
    <a href="/about/">About</a>
    <a href="/now/">Now</a>
</div>
{content}
</div>

</body>
</html>
